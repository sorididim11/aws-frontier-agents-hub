<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Security Agent — AWS Agent Space</title>
<link rel="icon" type="image/svg+xml" href="/static/icons/aws/aws-cloud.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}

.header{padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1e293b;flex-shrink:0}
.header h1{font-size:.85rem;color:#38bdf8;font-weight:600;white-space:nowrap}
.header .bc{font-size:.68rem;color:#64748b}
.header .bc a{color:#94a3b8;text-decoration:none}
.header .bc a:hover{color:#38bdf8;text-decoration:underline}

.main{flex:1;overflow-y:auto;padding:20px 24px}

.section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #1e293b}
.section:last-child{border-bottom:none}
.section h3{font-size:.74rem;color:#94a3b8;font-weight:600;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}

.row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.row label{font-size:.62rem;color:#64748b;min-width:110px}
.row select{background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:5px 10px;font-size:.64rem;outline:none;min-width:260px}
.row select:focus{border-color:#38bdf8}

.btn{padding:5px 14px;font-size:.62rem;font-weight:600;border:none;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-primary{background:#0ea5e9;color:#fff}
.btn-primary:hover{background:#0284c7}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-success{background:#22c55e;color:#fff}
.btn-success:hover{background:#16a34a}

.info-box{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:14px 18px;margin:12px 0}
.info-row{display:flex;gap:10px;padding:4px 0}
.info-row .lb{font-size:.58rem;color:#64748b;min-width:100px}
.info-row .vl{font-size:.62rem;color:#e2e8f0;font-family:'SF Mono',monospace}

.match-result{margin:14px 0;padding:12px 16px;border-radius:8px;font-size:.64rem}
.match-result.found{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80}
.match-result.not-found{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#fbbf24}
.match-result.no-repo{background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.2);color:#94a3b8}

.link-card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.link-card .icon{font-size:1.2rem}
.link-card .info{flex:1}
.link-card .title{font-size:.64rem;color:#e2e8f0;font-weight:600}
.link-card .sub{font-size:.54rem;color:#64748b;margin-top:2px}
.link-card .badge{font-size:.5rem;padding:2px 8px;border-radius:4px;background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}

.empty{font-size:.62rem;color:#475569;padding:12px 0}
.loading{display:inline-block;width:12px;height:12px;border:2px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
    <h1>Security Agent</h1>
    <span class="bc"><a href="/settings">설정</a> / Security Agent 연결</span>
</div>

<div class="main">
    <!-- Step 1: Select DevOps Agent Space -->
    <div class="section">
        <h3>1. DevOps Agent Space 선택</h3>
        <div class="row">
            <label>Agent Space</label>
            <select id="spaceSelect" onchange="onSpaceSelected()">
                <option value="">Loading...</option>
            </select>
        </div>
        <div id="spaceInfo"></div>
    </div>

    <!-- Step 2: Match / Action -->
    <div class="section" id="matchSection" style="display:none;">
        <h3>2. Security Agent 연결</h3>
        <div id="matchResult"><span class="loading"></span> 확인 중...</div>
        <div id="actionButtons" style="margin-top:12px;"></div>
    </div>

    <!-- Current Links -->
    <div class="section">
        <h3>연결된 Security Agent Spaces</h3>
        <div id="currentLinks"><span class="loading"></span> Loading...</div>
    </div>
</div>

<script src="/static/js/settings_targets.js?v={{ cache_bust }}"></script>
<script>initTargetsTab();</script>
</body>
</html>
