<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Security Insights — AWS Agent Space</title>
<link rel="icon" type="image/svg+xml" href="/static/icons/aws/aws-cloud.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

.header{padding:10px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e293b}
.header h1{font-size:.9rem;color:#38bdf8;font-weight:600}
.header .bc{font-size:.68rem;color:#64748b}
.header .bc a{color:#94a3b8;text-decoration:none}
.header .bc a:hover{color:#38bdf8;text-decoration:underline}

.ins-stats{display:flex;gap:10px;padding:16px 20px;flex-wrap:wrap}
.ins-stat-card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px 16px;min-width:80px;text-align:center}
.ins-stat-value{font-size:1.2rem;font-weight:700}
.ins-stat-label{font-size:.56rem;color:#64748b;margin-top:2px}

.ins-section{padding:16px 20px;border-bottom:1px solid #1e293b}
.ins-section h3{font-size:.74rem;color:#94a3b8;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

.ins-table{width:100%;border-collapse:collapse;font-size:.62rem}
.ins-table th{text-align:left;padding:7px 8px;color:#64748b;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap}
.ins-table td{padding:7px 8px;border-bottom:1px solid #1e293b;color:#cbd5e1}
.ins-table tr:hover td{background:#1e293b}

.sev-badge{padding:2px 7px;border-radius:8px;font-size:.54rem;font-weight:600;text-transform:uppercase;display:inline-block}
.sev-badge.critical{background:#ef444420;color:#fca5a5;border:1px solid #ef444440}
.sev-badge.high{background:#f9731620;color:#fb923c;border:1px solid #f9731640}
.sev-badge.medium{background:#f59e0b20;color:#fbbf24;border:1px solid #f59e0b40}
.sev-badge.low{background:#22c55e20;color:#4ade80;border:1px solid #22c55e40}

.status-badge{padding:2px 7px;border-radius:8px;font-size:.54rem;font-weight:600;display:inline-block}
.status-badge.open{background:#f59e0b20;color:#fbbf24;border:1px solid #f59e0b40}
.status-badge.fixed{background:#22c55e20;color:#4ade80;border:1px solid #22c55e40}

.risk-type{font-size:.52rem;color:#94a3b8;font-family:'SF Mono',monospace;background:#1e293b;padding:1px 5px;border-radius:3px}

.btn-primary{padding:6px 14px;font-size:.62rem;font-weight:600;background:#0ea5e9;color:#fff;border:none;border-radius:5px;cursor:pointer}
.btn-primary:hover{background:#0284c7}
.btn-secondary{padding:5px 12px;font-size:.58rem;background:transparent;color:#94a3b8;border:1px solid #334155;border-radius:5px;cursor:pointer}
.btn-secondary:hover{background:#1e293b;color:#e2e8f0}
.btn-verify{padding:3px 8px;font-size:.54rem;background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.3);border-radius:4px;cursor:pointer}
.btn-verify:hover{background:rgba(56,189,248,.2)}
.btn-verify:disabled{opacity:.4;cursor:not-allowed}

.ins-empty{font-size:.64rem;color:#475569;padding:20px 0;text-align:center}

.loading{display:inline-block;width:12px;height:12px;border:2px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
    <img src="/static/icons/aws/aws-cloud.svg" class="brand-logo" alt="AWS" style="width:24px;height:24px;border-radius:50%">
    <h1>Security Insights</h1>
    <span class="bc"><a href="/">Agent Space</a> / <a href="/settings#security">Security</a> / Insights</span>
    <span id="spaceInfo" style="margin-left:auto;font-size:.56rem;color:#64748b"></span>
</div>

<div id="insightsContent">
    <div style="text-align:center;padding:40px"><span class="loading"></span> 로딩 중...</div>
</div>

<script>var SPACE_ID = "{{ space_id }}" || new URLSearchParams(location.search).get("space_id") || "";</script>
<script src="/static/js/arch_layout.js?v={{ cache_bust }}"></script>
<script src="/static/js/security_insights.js?v={{ cache_bust }}"></script>
<script>securityInsightsInit();</script>
</body>
</html>
