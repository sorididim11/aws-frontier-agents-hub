<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Security Agent — AWS Agent Space</title>
<link rel="icon" type="image/svg+xml" href="/static/icons/aws/aws-cloud.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

.header{padding:10px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e293b}
.header h1{font-size:.9rem;color:#38bdf8;font-weight:600}
.header .bc{font-size:.68rem;color:#64748b}
.header .bc a{color:#94a3b8;text-decoration:none}
.header .bc a:hover{color:#38bdf8;text-decoration:underline}

.sec-section{padding:20px 24px;border-bottom:1px solid #1e293b}
.sec-section h3{font-size:.74rem;color:#94a3b8;font-weight:600;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.sec-section p.empty{font-size:.68rem;color:#475569;padding:12px 0}

.sec-table{width:100%;border-collapse:collapse;font-size:.65rem}
.sec-table th{text-align:left;padding:7px 10px;color:#64748b;font-weight:600;border-bottom:1px solid #334155;white-space:nowrap}
.sec-table td{padding:8px 10px;border-bottom:1px solid #1e293b;color:#cbd5e1}
.sec-table tr:hover td{background:#1e293b}
.sec-table .mono{font-family:'SF Mono',monospace;font-size:.58rem;color:#94a3b8}

.status-badge{padding:2px 7px;border-radius:8px;font-size:.54rem;font-weight:600;display:inline-block}
.status-badge.open{background:#f59e0b20;color:#fbbf24;border:1px solid #f59e0b40}
.status-badge.fixed{background:#22c55e20;color:#4ade80;border:1px solid #22c55e40}

.btn-primary{padding:6px 16px;font-size:.66rem;font-weight:600;background:#0ea5e9;color:#fff;border:none;border-radius:6px;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:#0284c7}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

.pentest-status{padding:10px 14px;border-radius:8px;margin:12px 0;font-size:.66rem;display:none}
.pentest-status.running{display:block;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2);color:#7dd3fc}

.loading{display:inline-block;width:12px;height:12px;border:2px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.space-info{font-size:.58rem;color:#94a3b8;padding:4px 10px;background:#1e293b;border-radius:4px}

.pr-link{color:#38bdf8;text-decoration:none;font-size:.56rem}
.pr-link:hover{text-decoration:underline}

.pentest-status.completed{display:block;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80}
.pentest-status.failed{display:block;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}

.sev-badge{padding:2px 7px;border-radius:8px;font-size:.54rem;font-weight:600;text-transform:uppercase;display:inline-block}
.sev-badge.critical{background:#ef444420;color:#fca5a5;border:1px solid #ef444440}
.sev-badge.high{background:#f9731620;color:#fb923c;border:1px solid #f9731640}
.sev-badge.medium{background:#f59e0b20;color:#fbbf24;border:1px solid #f59e0b40}
.sev-badge.low{background:#22c55e20;color:#4ade80;border:1px solid #22c55e40}

.remediate-btn{font-size:.56rem;padding:3px 8px;background:rgba(56,189,248,.12);color:#38bdf8;border:1px solid rgba(56,189,248,.3);border-radius:4px;cursor:pointer}
.remediate-btn:hover{background:rgba(56,189,248,.22)}

.task-timeline{border:1px solid #1e293b;border-radius:8px;padding:10px 12px;background:#0f172a}
.task-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid #1e293b0a}
.task-row:last-child{border-bottom:none}
.task-label{font-size:.54rem;color:#cbd5e1;min-width:180px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-bar-container{flex:1;height:6px;background:#1e293b;border-radius:3px;position:relative;overflow:hidden}
.task-bar{position:absolute;top:0;height:100%;border-radius:3px;transition:width .3s}
.task-duration{font-size:.5rem;color:#64748b;min-width:32px;text-align:right;font-family:'SF Mono',monospace}
.task-row:hover{background:#1e293b}
.task-detail{padding:8px 12px 10px 22px;background:#1e293b;border-radius:0 0 6px 6px;margin:-1px 0 4px;border:1px solid #334155;border-top:none}
.td-row{display:flex;gap:10px;padding:3px 0;border-bottom:1px solid #0f172a}
.td-row:last-child{border-bottom:none}
.td-lb{font-size:.54rem;color:#64748b;min-width:80px;flex-shrink:0}
.td-vl{font-size:.56rem;color:#cbd5e1;word-break:break-word}
</style>
</head>
<body>

{% if not embed %}
<div class="header">
    <img src="/static/icons/aws/security-hub.svg" style="width:22px;height:22px;border-radius:50%" alt="">
    <h1>Security Agent</h1>
    <span class="bc"><a href="/">Agent Space</a> / Security Agent</span>
    <span class="space-info" id="spaceInfo" style="margin-left:auto"></span>
</div>
{% endif %}

<!-- Code Review + Target Domain -->
<div class="sec-section">
    <h3>Code Review (SAST)</h3>
    <div id="sastFindings"><span class="loading"></span> 로딩 중...</div>
    <h3 style="margin-top:16px">Target Domains (대상 도메인)</h3>
    <div id="targetDomainStatus"><span class="loading"></span></div>
</div>

<!-- 최근 조사 결과 카드 -->
<div class="sec-section">
    <h3>최근 조사 결과</h3>
    <div id="latestJobCard"><span class="loading"></span> 로딩 중...</div>
</div>

<!-- 조사 실행 + 이력 -->
<div class="sec-section">
    <h3>조사 (Pentest)</h3>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn-primary" id="btnRunPentest" onclick="runPentest()">조사 시작 (Run Pentest)</button>
        <a id="secInsightsLink" href="/security/insights" style="font-size:.66rem;font-weight:600;color:#38bdf8;text-decoration:none">조사 결과 및 분석 보기 →</a>
    </div>
    <div class="pentest-status" id="pentestStatus"></div>
    <div id="pentestHistory"><span class="loading"></span> 이력 로딩 중...</div>
</div>

<script>
var _secSpaceId = '{{ sec_space_id }}';
var _secSpaceName = '{{ sec_space_name }}';

// space info 표시
var _si = document.getElementById('spaceInfo');
if (_si && _secSpaceName) _si.textContent = _secSpaceName;
else if (_si && _secSpaceId) _si.textContent = _secSpaceId.substring(0, 16) + '...';

// insights link에 sec_space_id 포함
var _sil = document.getElementById('secInsightsLink');
if (_sil && _secSpaceId) _sil.href = '/security/insights?sec_space_id=' + encodeURIComponent(_secSpaceId);

// 모든 security API 호출에 sec_space_id 추가
(function() {
    var origFetch = window.fetch;
    window.fetch = function(url, opts) {
        if (_secSpaceId && typeof url === 'string' && url.startsWith('/api/settings/security/')) {
            var sep = url.indexOf('?') >= 0 ? '&' : '?';
            url = url + sep + 'sec_space_id=' + encodeURIComponent(_secSpaceId);
        }
        return origFetch.call(this, url, opts);
    };
})();
</script>
<script src="/static/js/settings_security.js?v={{ cache_bust }}"></script>
<script>
settingsSecurityInit();
</script>
</body>
</html>
