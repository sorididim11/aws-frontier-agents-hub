apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        cloudwatch.aws.amazon.com/auto-annotate-dotnet: "false"
        cloudwatch.aws.amazon.com/auto-annotate-java: "false"
        cloudwatch.aws.amazon.com/auto-annotate-nodejs: "false"
        cloudwatch.aws.amazon.com/auto-annotate-python: "false"
        instrumentation.opentelemetry.io/inject-dotnet: "false"
        instrumentation.opentelemetry.io/inject-java: "false"
        instrumentation.opentelemetry.io/inject-nodejs: "false"
        instrumentation.opentelemetry.io/inject-python: "false"
      labels:
        app: gitlab
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:17.6.0-ce.0
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://gitlab.internal'
                gitlab_rails['initial_root_password'] = 'Xk9mP2vL7nQwR4jF8z'
                nginx['listen_port'] = 80
                nginx['listen_https'] = false
                puma['worker_processes'] = 0
                sidekiq['max_concurrency'] = 2
                sidekiq['min_concurrency'] = 1
                prometheus_monitoring['enable'] = false
                gitlab_rails['env'] = {'GITLAB_MEMORY_WATCHDOG_ENABLED' => '0', 'SIDEKIQ_MEMORY_KILLER_MAX_RSS' => '0'}
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 6Gi
          startupProbe:
            exec:
              command: ["curl", "-sf", "http://localhost/-/health"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 80
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["curl", "-sf", "http://localhost/-/health"]
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: ["curl", "-sf", "http://localhost/-/health"]
            periodSeconds: 30
            failureThreshold: 10
            timeoutSeconds: 10
