<h3 style="color:#94a3b8">6. JS-created SVG (same as arch_topo.js)</h3>
<div id="jstest"></div>
<script>
var paths = {
    "k8s-deploy": "/static/icons/k8s/deploy-clean.svg",
    "k8s-ds": "/static/icons/k8s/ds-clean.svg",
    "aws-cloudwatch": "/static/icons/aws/cloudwatch.svg",
    "aws-lambda": "/static/icons/aws/lambda.svg"
};
var cache = {};
var loaded = 0;
Object.keys(paths).forEach(function(id) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", paths[id], true);
    xhr.onload = function() {
        if (xhr.status === 200) {
            cache[id] = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xhr.responseText)));
            loaded++;
            if (loaded === Object.keys(paths).length) renderTest();
        }
    };
    xhr.onerror = function() { console.error("XHR fail:", id, paths[id]); };
    xhr.send();
});

function renderTest() {
    var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "400");
    svg.setAttribute("height", "60");
    var x = 0;
    Object.keys(cache).forEach(function(id) {
        var img = document.createElementNS("http://www.w3.org/2000/svg", "image");
        img.setAttribute("href", cache[id]);
        img.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", cache[id]);
        img.setAttribute("x", x);
        img.setAttribute("y", 0);
        img.setAttribute("width", 40);
        img.setAttribute("height", 40);
        svg.appendChild(img);
        
        var lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
        lbl.setAttribute("x", x + 20);
        lbl.setAttribute("y", 55);
        lbl.setAttribute("text-anchor", "middle");
        lbl.setAttribute("fill", "#94a3b8");
        lbl.setAttribute("font-size", "8");
        lbl.textContent = id;
        svg.appendChild(lbl);
        x += 80;
    });
    document.getElementById("jstest").appendChild(svg);
}
</script>
